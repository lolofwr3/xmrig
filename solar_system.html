<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar — Explorador 3D Interactivo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#00000a;--glass:rgba(4,8,26,0.78);
  --border:rgba(100,150,255,0.15);--accent:#6fa8ff;
  --text:#ccdeff;--dim:#3a5070;
  --mono:'Courier New',monospace;--serif:Georgia,serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);color:var(--text)}
canvas{display:block;position:fixed;inset:0}

/* Loading */
#loading{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .9s}
#loading h1{font-family:var(--serif);font-size:clamp(18px,3vw,32px);font-weight:normal;letter-spacing:.2em;color:#ddeeff;text-shadow:0 0 30px rgba(100,160,255,.5)}
#loading p{font-size:11px;letter-spacing:.1em;color:var(--dim)}
#lbar{width:260px;height:2px;background:rgba(100,150,255,.12);border-radius:1px;overflow:hidden}
#lbar-fill{height:100%;background:linear-gradient(90deg,#2a5acc,#6fa8ff);width:0%;transition:width .4s;box-shadow:0 0 8px rgba(100,160,255,.6)}
#lstatus{font-size:10px;color:var(--dim);letter-spacing:.08em}

/* Top HUD */
#hud-top{position:fixed;top:20px;left:24px;z-index:10;pointer-events:none}
#hud-top h2{font-family:var(--serif);font-size:clamp(13px,1.8vw,20px);font-weight:normal;letter-spacing:.15em;color:#e8f2ff;text-shadow:0 0 16px rgba(100,160,255,.4)}
#hud-top p{font-size:10px;color:var(--dim);letter-spacing:.07em;margin-top:3px}

/* Stats */
#stats{position:fixed;top:20px;right:20px;z-index:10;background:var(--glass);border:1px solid var(--border);border-radius:6px;padding:12px 16px;backdrop-filter:blur(12px);min-width:180px}
.sr{display:flex;justify-content:space-between;font-size:10px;line-height:2;border-bottom:1px solid rgba(80,120,200,.07)}
.sr:last-child{border:none}
.sl{color:var(--dim);letter-spacing:.05em}.sv{color:var(--accent);font-weight:bold}

/* Planet nav strip */
#planet-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;background:var(--glass);border:1px solid var(--border);border-radius:40px;padding:8px 14px;backdrop-filter:blur(12px)}
.pnav-btn{background:none;border:1px solid transparent;border-radius:20px;color:var(--dim);font-family:var(--mono);font-size:10px;padding:5px 12px;cursor:pointer;letter-spacing:.06em;transition:all .2s;white-space:nowrap}
.pnav-btn:hover{border-color:var(--border);color:var(--accent)}
.pnav-btn.active{border-color:rgba(100,150,255,.4);color:var(--accent);background:rgba(100,150,255,.08)}

/* Info panel */
#info-panel{position:fixed;right:-360px;top:50%;transform:translateY(-50%);z-index:10;width:320px;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:22px;backdrop-filter:blur(16px);transition:right .4s cubic-bezier(.16,1,.3,1)}
#info-panel.open{right:20px}
#info-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;line-height:1}
#info-close:hover{color:var(--accent)}
#info-name{font-family:var(--serif);font-size:22px;font-weight:normal;letter-spacing:.1em;margin-bottom:4px}
#info-type{font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
#info-desc{font-size:12px;color:var(--text);line-height:1.7;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:14px}
#info-facts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fact-card{background:rgba(20,40,80,.4);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.fact-label{font-size:9px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.fact-value{font-size:12px;color:var(--accent);font-weight:bold}
#info-moons{grid-column:span 2;margin-top:4px}

/* Controls hint */
#controls-hint{position:fixed;bottom:74px;left:24px;z-index:10;font-size:10px;color:var(--dim);letter-spacing:.05em;line-height:2}
.hint-key{display:inline-block;background:rgba(100,150,255,.08);border:1px solid rgba(100,150,255,.2);border-radius:3px;padding:1px 5px;font-size:9px;color:var(--accent);margin-right:4px}

/* Focus indicator */
#focus-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;font-family:var(--serif);font-size:13px;color:var(--accent);letter-spacing:.15em;opacity:0;transition:opacity .3s;text-shadow:0 0 20px rgba(100,160,255,.5)}
</style>
</head>
<body>

<div id="loading">
  <h1>SISTEMA SOLAR</h1>
  <p>EXPLORADOR INTERACTIVO 3D · DATOS REALES</p>
  <div id="lbar"><div id="lbar-fill"></div></div>
  <div id="lstatus">Iniciando motor 3D...</div>
</div>

<div id="hud-top">
  <h2>SISTEMA SOLAR</h2>
  <p id="view-label">VISTA: PANORÁMICA</p>
</div>

<div id="stats">
  <div class="sr"><span class="sl">CUERPOS</span><span class="sv">9 + cinturón</span></div>
  <div class="sr"><span class="sl">ESCALA DIST.</span><span class="sv" id="st-scale">×10⁷</span></div>
  <div class="sr"><span class="sl">VELOCIDAD</span><span class="sv" id="st-speed">1.0×</span></div>
  <div class="sr"><span class="sl">FPS</span><span class="sv" id="st-fps">—</span></div>
</div>

<div id="planet-nav">
  <button class="pnav-btn active" data-target="overview">☀ Sistema</button>
  <button class="pnav-btn" data-target="mercury">Mercurio</button>
  <button class="pnav-btn" data-target="venus">Venus</button>
  <button class="pnav-btn" data-target="earth">Tierra</button>
  <button class="pnav-btn" data-target="mars">Marte</button>
  <button class="pnav-btn" data-target="jupiter">Júpiter</button>
  <button class="pnav-btn" data-target="saturn">Saturno</button>
  <button class="pnav-btn" data-target="uranus">Urano</button>
  <button class="pnav-btn" data-target="neptune">Neptuno</button>
</div>

<div id="controls-hint">
  <div><span class="hint-key">Drag</span>Rotar cámara</div>
  <div><span class="hint-key">Scroll</span>Zoom</div>
  <div><span class="hint-key">Clic</span>Enfocar planeta</div>
  <div><span class="hint-key">ESC</span>Vista panorámica</div>
</div>

<div id="info-panel">
  <button id="info-close">✕</button>
  <div id="info-name">—</div>
  <div id="info-type">—</div>
  <div id="info-desc">—</div>
  <div id="info-facts"></div>
</div>

<div id="focus-label"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const SUN_DATA = {
  id:"sun",name:"Sol",radius:20,
  type:"Estrella — Tipo G2V",
  desc:"Nuestra estrella, una enana amarilla de secuencia principal. Contiene el 99.86% de toda la masa del Sistema Solar. En su núcleo, la fusión nuclear convierte 600 millones de toneladas de hidrógeno en helio cada segundo, liberando la energía que hace posible la vida en la Tierra.",
  facts:{Diámetro:"1 392 700 km",Masa:"1.99×10³⁰ kg","Temp. Superficie":"5 778 K","Temp. Corona":">1 000 000 K","Edad":"4.6 mil mill. años",Tipo:"Enana amarilla G2V"}
};

// ═══════════════════════════════════════════════════════════════
// GENERADORES DE TEXTURAS PROCEDURALES
// ═══════════════════════════════════════════════════════════════

function noise2D(x,y,s=1){
  return(Math.sin(x*3.1*s+y*4.7)*0.4+
         Math.sin(x*7.3*s-y*2.6)*0.3+
         Math.sin(x*1.8*s+y*8.1)*0.2+
         Math.sin(x*13.5*s-y*5.2)*0.1)*0.588;
}

function makeTexture(w,h,fn){
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  fn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.needsUpdate=true;
  return t;
}

const TEX={
  sun(){
    return makeTexture(512,256,(ctx,w,h)=>{
      const g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
      g.addColorStop(0,'#fff8e0');g.addColorStop(.3,'#ffdd60');
      g.addColorStop(.7,'#ff9900');g.addColorStop(1,'#c84400');
      ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
      // Gránulos solares
      for(let i=0;i<3000;i++){
        const x=Math.random()*w,y=Math.random()*h;
        const n=(noise2D(x/60,y/60)+1)/2;
        const bright=Math.floor(200+n*55);
        ctx.fillStyle=`rgba(${bright},${Math.floor(bright*0.6)},0,${n*0.35})`;
        const r=1+Math.random()*4;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      }
      // Manchas solares ocasionales
      for(let i=0;i<6;i++){
        const x=40+Math.random()*(w-80),y=40+Math.random()*(h-80);
        const r=4+Math.random()*12;
        ctx.fillStyle='rgba(80,20,0,0.5)';
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(140,40,0,0.3)';
        ctx.beginPath();ctx.arc(x,y,r*1.8,0,Math.PI*2);ctx.fill();
      }
    });
  },

  mercury(){
    return makeTexture(512,256,(ctx,w,h)=>{
      // Base gris oscuro
      ctx.fillStyle='#8a8878';ctx.fillRect(0,0,w,h);
      // Variaciones de terreno
      for(let x=0;x<w;x+=2){
        for(let y=0;y<h;y+=2){
          const n=(noise2D(x/80,y/80)+noise2D(x/30,y/30,2.1))/2;
          const v=Math.floor(100+n*60);
          ctx.fillStyle=`rgb(${v},${v-4},${v-8})`;
          ctx.fillRect(x,y,2,2);
        }
      }
      // Cráteres
      for(let i=0;i<120;i++){
        const x=Math.random()*w,y=Math.random()*h,r=2+Math.random()*18;
        ctx.strokeStyle=`rgba(60,58,55,${0.4+Math.random()*0.4})`;
        ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=`rgba(70,68,65,${0.3+Math.random()*0.3})`;
        ctx.beginPath();ctx.arc(x,y,r*.7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(160,158,150,${0.15+Math.random()*0.2})`;
        ctx.beginPath();ctx.arc(x-r*.3,y-r*.3,r*.25,0,Math.PI*2);ctx.fill();
      }
    });
  },

  venus(){
    return makeTexture(512,256,(ctx,w,h)=>{
      ctx.fillStyle='#d4a840';ctx.fillRect(0,0,w,h);
      // Bandas atmosféricas en espiral
      for(let y=0;y<h;y++){
        const n=noise2D(y/40,0)*20;
        for(let x=0;x<w;x++){
          const nn=noise2D((x+n)/50,y/50,.8);
          const light=Math.floor(200+nn*55);
          const r=Math.min(255,light+10);
          const g=Math.min(255,Math.floor(light*.78));
          const b=Math.min(255,Math.floor(light*.2));
          ctx.fillStyle=`rgb(${r},${g},${b})`;
          ctx.fillRect(x,y,1,1);
        }
      }
      // Velo brillante general
      const grd=ctx.createLinearGradient(0,0,w,0);
      grd.addColorStop(0,'rgba(255,210,100,.12)');
      grd.addColorStop(.5,'rgba(255,240,160,.18)');
      grd.addColorStop(1,'rgba(255,210,100,.12)');
      ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    });
  },

  earth(){
    return makeTexture(1024,512,(ctx,w,h)=>{
      // Océano
      ctx.fillStyle='#1a5f9e';ctx.fillRect(0,0,w,h);
      // Añadir profundidad oceánica
      for(let x=0;x<w;x+=2){
        for(let y=0;y<h;y+=2){
          const n=(noise2D(x/120,y/120)+1)/2;
          if(n<0.5){
            const depth=Math.floor(20+n*30);
            ctx.fillStyle=`rgba(0,${depth},${80+n*60},.4)`;
            ctx.fillRect(x,y,2,2);
          }
        }
      }
      // Continentes (posiciones aproximadas en proyección equirrectangular)
      const drawContinent=(pts,col)=>{
        ctx.fillStyle=col;
        ctx.beginPath();
        ctx.moveTo(pts[0][0]*w,pts[0][1]*h);
        for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0]*w,pts[i][1]*h);
        ctx.closePath();ctx.fill();
      };
      const c1='#2d7a2d',c2='#3a8c2a',c3='#5a9c3a';
      // América del Norte
      drawContinent([[.07,.18],[.22,.18],[.28,.28],[.26,.42],[.18,.52],[.12,.48],[.05,.32]],c1);
      // América del Sur
      drawContinent([[.15,.5],[.26,.48],[.3,.58],[.28,.75],[.18,.82],[.12,.72],[.11,.58]],c2);
      // Europa
      drawContinent([[.44,.18],[.56,.18],[.58,.3],[.52,.35],[.44,.3]],c1);
      // África
      drawContinent([[.45,.3],[.57,.3],[.6,.42],[.58,.68],[.5,.78],[.44,.7],[.42,.55],[.44,.38]],c3);
      // Asia
      drawContinent([[.56,.14],[.88,.14],[.92,.28],[.88,.4],[.78,.45],[.65,.42],[.58,.3],[.52,.2]],c1);
      // Australia
      drawContinent([[.74,.58],[.86,.56],[.9,.64],[.88,.72],[.8,.75],[.72,.68],[.7,.62]],c2);
      // Antártida
      ctx.fillStyle='#d0dde8';
      ctx.fillRect(0,h*.85,w,h*.15);
      // Rugosidad en continentes
      for(let x=0;x<w;x+=3){
        for(let y=0;y<h;y+=3){
          const n=noise2D(x/40,y/40,3);
          if(n>0.18){ctx.fillStyle=`rgba(80,50,20,${n*.25})`;ctx.fillRect(x,y,3,3);}
        }
      }
      // Casquete polar norte
      const gradN=ctx.createLinearGradient(0,0,0,h*.22);
      gradN.addColorStop(0,'rgba(230,240,255,.95)');
      gradN.addColorStop(1,'rgba(230,240,255,0)');
      ctx.fillStyle=gradN;ctx.fillRect(0,0,w,h*.22);
      // Nubes
      for(let i=0;i<80;i++){
        const x=Math.random()*w,y=Math.random()*h*.8+h*.1;
        const rw=15+Math.random()*80,rh=6+Math.random()*20;
        const alpha=.18+Math.random()*.22;
        const grc=ctx.createRadialGradient(x,y,0,x,y,rw);
        grc.addColorStop(0,`rgba(255,255,255,${alpha*1.5})`);

let renderer,scene,camera;

const planetPositions={};// id → Vector3 world position

let time=0,timeScale=1;
let frameCount=0,lastFpsTime=performance.now();

// Cámara

function setProgress(p,msg){

function initRenderer(){
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:'high-performance'});

// ─── Campo de estrellas ───────────────────────────────────────
function buildStarField(){
  const N=8000;
  const pos=new Float32Array(N*3),col=new Float32Array(N*3);
  const STAR_COLORS=['#ffffff','#ffe8d0','#d0e0ff','#fff0b0','#ffd0b0','#c0d8ff'];
  for(let i=0;i<N;i++){
    const r=2000+Math.random()*6000;
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.cos(ph);
    pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const c=new THREE.Color(STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)]);
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat=new THREE.PointsMaterial({size:1.8,vertexColors:true,transparent:true,opacity:.9,sizeAttenuation:true});
  scene.add(new THREE.Points(geo,mat));
}

// ─── Sol ─────────────────────────────────────────────────────
function buildSun(){
  const r=SUN_DATA.radius;
  // Esfera principal
  const geo=new THREE.SphereGeometry(r,64,32);
  const mat=new THREE.MeshBasicMaterial({map:TEX.sun()});
  sunMesh=new THREE.Mesh(geo,mat);
  sunMesh.userData={id:'sun',data:SUN_DATA};
  scene.add(sunMesh);

  // Corona 1 (naranja-amarillo)
  const g1=new THREE.SphereGeometry(r*1.08,32,16);
  const m1=new THREE.MeshBasicMaterial({
    color:0xff8800,transparent:true,opacity:.15,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide
  });
  sunGlow=new THREE.Mesh(g1,m1);scene.add(sunGlow);

  // Atmósfera exterior (más grande, azul pálido)
  const g2=new THREE.SphereGeometry(r*1.25,32,16);
  const m2=new THREE.MeshBasicMaterial({
    color:0xffdd88,transparent:true,opacity:.07,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide
  });
  sunAtmo=new THREE.Mesh(g2,m2);scene.add(sunAtmo);

  // Lens flare simulado: sprite brillante en el centro
  const g3=new THREE.SphereGeometry(r*1.5,16,8);
  const m3=new THREE.MeshBasicMaterial({
    color:0xffee99,transparent:true,opacity:.04,
    blending:THREE.AdditiveBlending,depthWrite:false
  });
  scene.add(new THREE.Mesh(g3,m3));
}

// ─── Órbita (línea) ───────────────────────────────────────────
function buildOrbitLine(distance){
  const pts=[];
  const N=128;
  for(let i=0;i<=N;i++){
    const a=i/N*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*distance,0,Math.sin(a)*distance));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:0x223355,transparent:true,opacity:.35});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  orbitLines.push(line);
  return line;
}

// ─── Atmósfera de planeta ────────────────────────────────────
function addAtmosphere(parent,radius,color,opacity=.25){
  const geo=new THREE.SphereGeometry(radius*1.04,32,16);
  const mat=new THREE.MeshBasicMaterial({
    color,transparent:true,opacity,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide
  });
  parent.add(new THREE.Mesh(geo,mat));
}

// ─── Anillos de Saturno ───────────────────────────────────────
function buildSaturnRings(parent,planetRadius){
  const innerR=planetRadius*1.3,outerR=planetRadius*2.8;
  const geo=new THREE.RingGeometry(innerR,outerR,128);
  // Mapear UVs para la textura de anillos (RingGeometry no las genera bien por defecto)
  const pos=geo.attributes.position;
  const uv=new Float32Array(pos.count*2);
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    const r=Math.sqrt(x*x+z*z);
    uv[i*2]=(r-innerR)/(outerR-innerR);
    uv[i*2+1]=.5;
  }
  geo.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  const mat=new THREE.MeshBasicMaterial({
    map:TEX.saturnRings(),
    transparent:true,opacity:.85,
    side:THREE.DoubleSide,depthWrite:false
  });
  const ring=new THREE.Mesh(geo,mat);
  ring.rotation.x=Math.PI/2;
  parent.add(ring);
}

// ─── Constructor de planeta ───────────────────────────────────
function buildPlanet(data){
  const group=new THREE.Group();
  group.userData.id=data.id;

  // Inclinar el eje
  const tiltGroup=new THREE.Group();
  tiltGroup.rotation.z=THREE.MathUtils.degToRad(data.axialTilt);

  // Textura
  let texMap;
  const tm=TEX[data.id];
  texMap=tm?tm():TEX.generic(data.color);

  const geo=new THREE.SphereGeometry(data.radius,64,32);
  const mat=new THREE.MeshPhongMaterial({
    map:texMap,
    shininess:data.id==='earth'?60:20,
    specular:data.id==='earth'?new THREE.Color(.2,.2,.4):new THREE.Color(.05,.05,.05),
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.userData={id:data.id,data};
  tiltGroup.add(mesh);

  // Capa de nubes para la Tierra
  if(data.id==='earth'){
    const cGeo=new THREE.SphereGeometry(data.radius*1.012,64,32);
    const cMat=new THREE.MeshPhongMaterial({
      map:TEX.earthClouds(),
      transparent:true,opacity:.7,depthWrite:false,
    });
    const clouds=new THREE.Mesh(cGeo,cMat);
    clouds.userData.isClouds=true;
    tiltGroup.add(clouds);
    // Atmósfera azul
    addAtmosphere(tiltGroup,data.radius,0x4488ff,.2);
  }
  if(data.id==='venus') addAtmosphere(tiltGroup,data.radius,0xffaa44,.18);
  if(data.id==='mars')  addAtmosphere(tiltGroup,data.radius,0xff6622,.07);
  if(data.id==='jupiter'||data.id==='saturn') addAtmosphere(tiltGroup,data.radius,0xcc9944,.08);
  if(data.id==='uranus'||data.id==='neptune') addAtmosphere(tiltGroup,data.radius,0x44ccdd,.1);

  // Anillos de Saturno
  if(data.id==='saturn') buildSaturnRings(tiltGroup,data.radius);

  group.add(tiltGroup);
  group.userData.tiltGroup=tiltGroup;
  group.userData.mesh=mesh;

  // Lunas
  const moons=[];
  (data.moonsData||[]).forEach(md=>{
    const mGroup=new THREE.Group();
    const mTex=data.id==='earth'?TEX.moon():TEX.generic(md.color);
    const mGeo=new THREE.SphereGeometry(md.radius,32,16);
    const mMat=new THREE.MeshPhongMaterial({map:mTex,shininess:10});
    const mMesh=new THREE.Mesh(mGeo,mMat);
    mMesh.position.x=md.distance;
    mGroup.add(mMesh);
    group.add(mGroup);
    moons.push({group:mGroup,mesh:mMesh,data:md,angle:Math.random()*Math.PI*2});
  });

  scene.add(group);
  buildOrbitLine(data.distance);

  const obj={group,mesh,tiltGroup,moons,data,angle:Math.random()*Math.PI*2};
  planetObjects[data.id]=obj;
  return obj;
}

// ─── Cinturón de asteroides ──────────────────────────────────
function buildAsteroidBelt(){
  const N=3000;
  const pos=new Float32Array(N*3),col=new Float32Array(N*3);
  const innerD=64,outerD=78;
  for(let i=0;i<N;i++){
    const a=Math.random()*Math.PI*2;
    const r=innerD+(outerD-innerD)*Math.pow(Math.random(),.5);
    const y=(Math.random()-.5)*3;
    pos[i*3]=Math.cos(a)*r;pos[i*3+1]=y;pos[i*3+2]=Math.sin(a)*r;
    const g=.4+Math.random()*.3;
    col[i*3]=g*.9;col[i*3+1]=g*.88;col[i*3+2]=g*.85;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat=new THREE.PointsMaterial({size:.7,vertexColors:true,transparent:true,opacity:.6,sizeAttenuation:true});
  asteroidBelt=new THREE.Points(geo,mat);
  scene.add(asteroidBelt);
}

// SISTEMA DE CÁMARA
// ═══════════════════════════════════════════════════════════════
function spherical2Cart(r,theta,phi){
  return new THREE.Vector3(
    r*Math.sin(phi)*Math.sin(theta),
    r*Math.cos(phi),
    r*Math.sin(phi)*Math.cos(theta)
  );
}

function updateCamera(){
  cam.spherical.phi=Math.max(.04,Math.min(Math.PI-.04,cam.spherical.phi));
  // Lerp hacia los objetivos
  cam.target.lerp(cam.targetGoal,.08);
  cam.spherical.r+=(cam.rGoal-cam.spherical.r)*.07;
  const pos=spherical2Cart(cam.spherical.r,cam.spherical.theta,cam.spherical.phi);
  camera.position.copy(cam.target).add(pos);
  camera.lookAt(cam.target);
}

function focusPlanet(id){
  if(id==='overview'||!id){
    cam.targetGoal.set(0,0,0);cam.rGoal=280;
    cam.focusedPlanet=null;
    document.getElementById('view-label').textContent='VISTA: PANORÁMICA';
    closeInfoPanel();
    document.querySelectorAll('.pnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.target==='overview'));
    return;
  }
  if(id==='sun'){
    cam.targetGoal.set(0,0,0);cam.rGoal=SUN_DATA.radius*5;
    cam.focusedPlanet='sun';
    document.getElementById('view-label').textContent='FOCO: SOL';
    showInfoPanel(SUN_DATA);
    return;
  }
  const obj=planetObjects[id];if(!obj)return;
  cam.focusedPlanet=id;
  const worldPos=new THREE.Vector3();
  obj.group.getWorldPosition(worldPos);
  cam.targetGoal.copy(worldPos);
  cam.rGoal=obj.data.radius*7;
  document.getElementById('view-label').textContent='FOCO: '+obj.data.name.toUpperCase();
  showInfoPanel(obj.data);
  document.querySelectorAll('.pnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.target===id));
}

// ═══════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════
function showInfoPanel(data){
  document.getElementById('info-name').textContent=data.name;
  document.getElementById('info-name').style.color=data.color||'#e8f2ff';
  document.getElementById('info-type').textContent=data.type||'';
  document.getElementById('info-desc').textContent=data.desc||'';
  const factsDiv=document.getElementById('info-facts');
  factsDiv.innerHTML='';
  Object.entries(data.facts||{}).forEach(([k,v])=>{
    factsDiv.innerHTML+=`<div class="fact-card"><div class="fact-label">${k}</div><div class="fact-value">${v}</div></div>`;
  });
  document.getElementById('info-panel').classList.add('open');
}
function closeInfoPanel(){document.getElementById('info-panel').classList.remove('open');}

// ═══════════════════════════════════════════════════════════════
// CONTROLES
// ═══════════════════════════════════════════════════════════════
function setupControls(){
  const cvs=renderer.domElement;

  // Mouse drag
  cvs.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    cam.isDragging=true;cam.lastMouse={x:e.clientX,y:e.clientY};
  });
  window.addEventListener('mousemove',e=>{
    if(!cam.isDragging)return;
    const dx=e.clientX-cam.lastMouse.x,dy=e.clientY-cam.lastMouse.y;
    cam.lastMouse={x:e.clientX,y:e.clientY};
    const s=.004*(cam.spherical.r/100);
    cam.spherical.theta-=dx*s;cam.spherical.phi-=dy*s;
  });
  window.addEventListener('mouseup',()=>{cam.isDragging=false;});

  // Scroll zoom
  cvs.addEventListener('wheel',e=>{
    e.preventDefault();
    cam.rGoal*=e.deltaY>0?1.1:.91;
    cam.rGoal=Math.max(4,Math.min(2000,cam.rGoal));
  },{passive:false});

  // Clic en planeta
  const raycaster=new THREE.Raycaster();
  const mouse2D=new THREE.Vector2();
  cvs.addEventListener('click',e=>{
    if(cam.isDragging)return;
    mouse2D.x=(e.clientX/innerWidth)*2-1;
    mouse2D.y=-(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(mouse2D,camera);
    const clickables=[sunMesh,...Object.values(planetObjects).map(o=>o.mesh)];
    const hits=raycaster.intersectObjects(clickables,false);
    if(hits.length>0){
      const id=hits[0].object.userData.id;
      focusPlanet(id);
    }
  });

  // Teclado
  window.addEventListener('keydown',e=>{
    if(e.key==='Escape')focusPlanet('overview');
    if(e.key==='+')timeScale=Math.min(50,timeScale*1.5);
    if(e.key==='-')timeScale=Math.max(.1,timeScale/1.5);
  });

  // Botones de nav
  document.querySelectorAll('.pnav-btn').forEach(btn=>{
    btn.addEventListener('click',()=>focusPlanet(btn.dataset.target));
  });

  // Cerrar panel
  document.getElementById('info-close').addEventListener('click',()=>{
    closeInfoPanel();
    document.querySelectorAll('.pnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.target==='overview'));
    cam.focusedPlanet=null;
    cam.targetGoal.set(0,0,0);cam.rGoal=280;
    document.getElementById('view-label').textContent='VISTA: PANORÁMICA';
  });

  // Touch
  let lastTD=0;
  cvs.addEventListener('touchstart',e=>{
    if(e.touches.length===1){cam.isDragging=true;cam.lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}
    else if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      lastTD=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:true});
  cvs.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&cam.isDragging){
      const dx=e.touches[0].clientX-cam.lastMouse.x,dy=e.touches[0].clientY-cam.lastMouse.y;
      cam.lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
      cam.spherical.theta-=dx*.006;cam.spherical.phi-=dy*.006;
    }else if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);
      cam.rGoal*=lastTD/d;cam.rGoal=Math.max(4,Math.min(2000,cam.rGoal));lastTD=d;
    }
  },{passive:false});
  cvs.addEventListener('touchend',()=>{cam.isDragging=false;});

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

// ═══════════════════════════════════════════════════════════════
// BUCLE DE ANIMACIÓN
// ═══════════════════════════════════════════════════════════════
function animate(ts){
  requestAnimationFrame(animate);
  const dt=.016;
  time+=dt*timeScale;

  // Rotar Sol
  if(sunMesh)sunMesh.rotation.y=time*.004;
  if(sunGlow){sunGlow.rotation.y=time*.002;sunGlow.scale.setScalar(1+Math.sin(time*.5)*.015);}
  if(sunAtmo) sunAtmo.rotation.y=-time*.001;

  // Actualizar planetas
  PLANET_DATA.forEach(data=>{
    const obj=planetObjects[data.id];if(!obj)return;
    // Revolución orbital
    const orbitSpeed=(2*Math.PI)/(data.orbitalPeriod*5);
    obj.angle+=orbitSpeed*timeScale*dt;
    obj.group.position.x=Math.cos(obj.angle)*data.distance;
    obj.group.position.z=Math.sin(obj.angle)*data.distance;
    // Rotación propia
    const rotSpeed=(2*Math.PI)/Math.abs(data.rotPeriod)*Math.sign(data.rotPeriod);
    obj.mesh.rotation.y+=rotSpeed*dt*timeScale*.3;
    // Rotar nubes de la Tierra un poco más lento
    obj.tiltGroup.children.forEach(c=>{if(c.userData&&c.userData.isClouds)c.rotation.y-=.0001*timeScale;});
    // Moons
    obj.moons.forEach(moon=>{
      const ms=(2*Math.PI)/(Math.abs(moon.data.period)*5)*Math.sign(moon.data.period);
      moon.angle+=ms*timeScale*dt;
      moon.group.rotation.y=moon.angle;
    });
    // Si este planeta está enfocado, actualizar target de cámara
    if(cam.focusedPlanet===data.id){
      cam.targetGoal.copy(obj.group.position);
    }
  });

  // Auto-rotar lento en panorámica
  if(!cam.isDragging&&!cam.focusedPlanet){
    cam.spherical.theta+=.0004;
  }

  updateCamera();
  document.getElementById('st-speed').textContent=timeScale.toFixed(1)+'×';

  // FPS
  frameCount++;
  const now=performance.now();
  if(now-lastFpsTime>600){
    document.getElementById('st-fps').textContent=Math.round(frameCount/(now-lastFpsTime)*1000);
    frameCount=0;lastFpsTime=now;
  }

  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════════
async function main(){
  setProgress(5,'Iniciando WebGL...');await delay(100);
  initRenderer();
  setProgress(15,'Generando campo estelar...');await delay(80);
  buildStarField();
  setProgress(25,'Construyendo el Sol...');await delay(80);
  buildSun();
  setProgress(35,'Generando texturas planetarias...');await delay(80);

  for(let i=0;i<PLANET_DATA.length;i++){
    const d=PLANET_DATA[i];
    setProgress(35+i*7,'Construyendo '+d.name+'...');
    await delay(60);
    buildPlanet(d);
  }

  setProgress(92,'Construyendo cinturón de asteroides...');await delay(80);
  buildAsteroidBelt();
  setProgress(97,'Configurando controles...');await delay(60);
  setupControls();
  updateCamera();
  setProgress(100,'¡Listo para explorar!');await delay(400);

  // Ocultar loading
  const ls=document.getElementById('loading');
  ls.style.opacity='0';setTimeout(()=>ls.remove(),1000);

  requestAnimationFrame(animate);
  console.log('%c🌍 Sistema Solar 3D cargado.','color:#6fa8ff;font-size:14px;font-weight:bold');
  console.log('   Haz clic en un planeta o usa los botones de navegación.');
  console.log('   + / - para controlar velocidad del tiempo.');
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}
main().catch(console.error);
</script>
